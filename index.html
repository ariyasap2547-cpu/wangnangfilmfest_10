    <style>
        :root { --gold: #d4af37; --gold-light: #f9d976; --black: #080808; }
        body { background-color: var(--black); background-image: radial-gradient(circle at center, #1a0000 0%, var(--black) 100%); color: white; font-family: 'Anuphan', sans-serif; scroll-behavior: smooth; min-height: 100vh; }
        .font-th-title { font-weight: 700; }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); } }
        
        .slider { background: rgba(212, 175, 55, 0.03); border-top: 1px solid rgba(212, 175, 55, 0.1); border-bottom: 1px solid rgba(212, 175, 55, 0.1); height: 100px; margin: 40px auto; overflow: hidden; position: relative; display: flex; align-items: center; }
        .slide-track { animation: scroll 40s linear infinite; display: flex; width: calc(150px * 32); }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-150px * 16)); } }
        .slide { height: 100px; width: 150px; display: flex; align-items: center; justify-content: center; padding: 0 15px; }
        .slide img { max-height: 60px; max-width: 120px; object-fit: contain; opacity: 0.6; }

        #movie-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; margin-bottom: 6rem; }
        .movie-card { background: linear-gradient(145deg, #111 0%, #000 100%); border: 2px solid #222; transition: all 0.3s ease; position: relative; overflow: hidden; border-radius: 12px; cursor: pointer; }
        .movie-card:hover { border-color: var(--gold); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.25); transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 400px; object-fit: contain; background-color: #000; }
        .seat-badge { position: absolute; bottom: 10px; right: 10px; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.1); z-index: 10; }

        /* Synopsis Modal พรีเมียม */
        #synopsis-modal .synopsis-content { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .syn-sidebar { border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .syn-poster-frame { border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-booking-premium { background: linear-gradient(135deg, #e5c05c 0%, #d4af37 50%, #b8860b 100%); color: #1a1a1a; font-weight: 700; border-radius: 50px; padding: 18px; letter-spacing: 0.5px; transition: 0.4s; }
        .title-glow-line { width: 4px; height: 24px; background: var(--gold); border-radius: 10px; box-shadow: 0 0 10px var(--gold); margin-right: 15px; }

        .input-premium { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; padding: 0.8rem; border-radius: 12px; color: white; outline: none; }
        select.input-premium option { background-color: #1a1a1a; }
        .type-selector input:checked + label { background: var(--gold); color: black; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 12px; }
        
        .round-card-premium { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-left: 4px solid var(--gold); border-radius: 16px; transition: all 0.3s ease; cursor: pointer; }
        .guest-entry { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .hidden { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>

        let currentRoundID = null;
        let checkRoundID = 1;
        let currentTicketPool = [];

        function init() {
            const track = document.getElementById('slider-track');
            let sliderHTML = ''; const v = new Date().getTime();
            for(let i=1; i<=16; i++) { sliderHTML += `<div class="slide"><img src="prod${i}.png?v=${v}" onerror="this.src='prod${i}.PNG?v=${v}'"></div>`; }
            track.innerHTML = sliderHTML + sliderHTML;

            const grid = document.getElementById('movie-grid');
            movies.forEach(m => {
                const rInfo = {1:"10:45 - 12:00", 2:"12:15 - 14:00", 3:"14:15 - 16:00", 4:"16:15 - 18:00", 5:"18:45 - 21:00"};
                grid.innerHTML += `
                    <div class="movie-card flex flex-col h-full" onclick="openSynopsis(${m.id})">
                        <img src="${m.post}?v=${v}" onerror="this.src='https://via.placeholder.com/400x560/222/D4AF37?text=WN10'">
                        <div id="badge-movie-${m.id}" class="seat-badge">Loading...</div>
                        <div class="p-6 flex flex-col flex-grow bg-black/60">
                            <h3 class="text-xl font-bold text-white mb-1 truncate font-th-title">${m.title}</h3>
                            <p class="text-[11px] text-[--gold] font-bold uppercase tracking-wider mb-4">${m.prod}</p>
                            <div class="mt-auto text-xs text-gray-400 font-bold"><p>ความยาว: ${m.len} นาที</p><p class="text-[--gold]">รอบ : ${m.round} เวลา : ${rInfo[m.round]}</p></div>
                        </div>
                    </div>`;
                db.ref(`capacities/round${m.round}`).on('value', snap => {
                    const left = 200 - (snap.val() || 0);
                    const badge = document.getElementById(`badge-movie-${m.id}`);
                    if(badge) {
                        let color = left <= 20 ? "#ff4d4d" : (left <= 100 ? "#fb923c" : "#4ade80");
                        badge.style.color = color; badge.innerHTML = `Seats: ${left <= 0 ? 'FULL' : left}`;
                    }
                });
            });
            setCheckRound(1);
        }

        window.openSynopsis = function(id) {
            const m = movies.find(x => x.id === id);
            const rInfo = {1:"10:45 - 12:00", 2:"12:15 - 14:00", 3:"14:15 - 16:00", 4:"16:15 - 18:00", 5:"18:45 - 21:00"};
            document.getElementById('md-poster').src = m.post;
            document.getElementById('md-title').innerText = m.title;
            document.getElementById('md-prod').innerText = m.prod;
            document.getElementById('md-director').innerText = `กำกับโดย : ${m.director}`;
            document.getElementById('md-len').innerText = `ความยาว: ${m.len} นาที`;
            document.getElementById('md-round').innerText = `รอบที่ ${m.round} เวลา : ${rInfo[m.round]}`;
            document.getElementById('md-desc').innerText = m.desc;
            document.getElementById('book-btn-direct').onclick = function() { closeSynopsis(); selectRound(parseInt(m.round)); };
            document.getElementById('synopsis-modal').classList.remove('hidden');
        };

        window.closeSynopsis = function() { document.getElementById('synopsis-modal').classList.add('hidden'); };

        function generateGuestFields(count) {
            const container = document.getElementById('guests-container');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) {
                container.innerHTML += `
                    <div class="guest-entry">
                        <p class="text-[--gold] text-[10px] font-bold uppercase mb-3">ท่านที่ ${i} ${i==1 ? '(ผู้จองหลัก)' : ''}</p>
                        <div class="flex gap-2 type-selector mb-4">
                            <div class="flex-1"><input type="radio" name="type_${i}" id="t${i}_gen" value="บุคคลทั่วไป" class="hidden" checked onchange="toggleGuestStudent(${i}, false)"><label for="t${i}_gen" class="block text-center p-2 rounded-lg border border-white/10 text-[10px] cursor-pointer">ทั่วไป</label></div>
                            <div class="flex-1"><input type="radio" name="type_${i}" id="t${i}_std" value="นักศึกษา" class="hidden" onchange="toggleGuestStudent(${i}, true)"><label for="t${i}_std" class="block text-center p-2 rounded-lg border border-white/10 text-[10px] cursor-pointer">นักศึกษา</label></div>
                        </div>
                        <div class="flex gap-2 mb-3">
                            <select id="p${i}" class="input-premium w-20 text-xs"><option>นาย</option><option>นาง</option><option>นางสาว</option></select>
                            <input type="text" id="n${i}" required class="input-premium flex-1 text-xs" placeholder="ชื่อ-นามสกุล">
                        </div>
                        <div id="s${i}_fields" class="hidden space-y-2 mb-3">
                            <input type="text" id="sid${i}" class="input-premium text-xs" placeholder="รหัสนักศึกษา">
                            <input type="text" id="aca${i}" class="input-premium text-xs" placeholder="ชื่อสถานศึกษา">
                        </div>
                        ${i==1 ? `<input type="tel" id="u_phone" required pattern="[0-9]{10}" class="input-premium text-xs" placeholder="เบอร์โทรศัพท์">` : ''}
                    </div>`;
            }
        }

        function toggleGuestStudent(idx, isStudent) {
            const field = document.getElementById(`s${idx}_fields`);
            isStudent ? field.classList.remove('hidden') : field.classList.add('hidden');
        }

        function openRoundSelection() {
            const list = document.getElementById('round-list');
            list.innerHTML = '';
            const times = {1:"10:45 - 12:00", 2:"12:15 - 14:00", 3:"14:15 - 16:00", 4:"16:15 - 18:00", 5:"18:45 - 21:00"};
            [1,2,3,4,5].forEach(rid => {
                const moviesInRound = movies.filter(m => m.round == rid).map(m => m.title);
                db.ref(`capacities/round${rid}`).on('value', snap => {
                    const left = 200 - (snap.val() || 0);
                    const isFull = left <= 0;
                    let color = left <= 20 ? "#ff4d4d" : (left <= 100 ? "#fb923c" : "#4ade80");
                    list.innerHTML += `<div onclick="${isFull ? '' : `selectRound(${rid})`}" class="round-card-premium p-6 flex justify-between items-center ${isFull ? 'opacity-40 grayscale cursor-not-allowed' : ''}"><div class="flex-1"><p class="text-white font-bold text-xl mb-1 flex items-center"><span class="status-dot" style="background: ${color}"></span>ROUND 0${rid} <span class="text-[--gold] text-sm ml-2 font-normal italic">${times[rid]}</span></p><p class="text-[11px] text-gray-400 italic truncate max-w-sm pl-6">${moviesInRound.join(", ")}</p></div><div class="text-right pl-6 border-l border-white/10"><p class="text-3xl font-oscar font-bold" style="color: ${color}">${isFull ? 'FULL' : left}</p><p class="text-[9px] text-gray-500 uppercase tracking-widest font-bold">Seats Left</p></div></div>`;
                });
            });
            openModal('round-modal');
        }

        function selectRound(id) { currentRoundID = id; closeModal('round-modal'); openModal('booking-modal'); }

        async function confirmBooking(e) {
            e.preventDefault();
            const count = parseInt(document.getElementById('u_seats').value);
            const phone = document.getElementById('u_phone').value;
            const btn = document.getElementById('submit-btn');
            const uniqueKey = `${phone}-R${currentRoundID}`;

            btn.disabled = true; btn.innerText = "Processing...";
            const snapCheck = await db.ref(`bookings/${uniqueKey}`).once('value');
            if(snapCheck.exists()) { alert("คุณได้จองรอบนี้ไปแล้ว!"); btn.disabled = false; return; }

            db.ref(`capacities/round${currentRoundID}`).transaction(curr => (curr + count <= 200 ? (curr || 0) + count : undefined), async (err, comm, snapCap) => {
                if(comm) {
                    let tickets = [];
                    for(let i=1; i<=count; i++) {
                        const data = {
                            name: document.getElementById(`n${i}`).value,
                            prefix: document.getElementById(`p${i}`).value,
                            userType: document.querySelector(`input[name="type_${i}"]:checked`).value,
                            studentID: document.getElementById(`sid${i}`)?.value || "-",
                            academy: document.getElementById(`aca${i}`)?.value || "-",
                            phone: phone, round: currentRoundID, ticketID: `WN-R${currentRoundID}-${String(snapCap.val()-(count-i)).padStart(3,'0')}`
                        };
                        tickets.push(data);
                        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
                    }
                    await db.ref(`bookings/${uniqueKey}`).set({ group: tickets });
                    showMultiTickets(tickets);
                } else { alert("ขออภัย! ที่นั่งไม่พอ"); btn.disabled = false; }
            });
        }

        function showMultiTickets(tickets) {
            currentTicketPool = tickets; renderTicket(0);
            const pagers = document.getElementById('ticket-pagers'); pagers.innerHTML = '';
            tickets.forEach((_, i) => { pagers.innerHTML += `<button onclick="renderTicket(${i})" class="w-8 h-8 rounded-full border border-gold/50 text-[10px] hover:bg-gold hover:text-black transition">${i+1}</button>`; });
            closeModal('booking-modal'); openModal('ticket-modal');
        }

        function renderTicket(idx) {
            const data = currentTicketPool[idx];
            const canvas = document.getElementById('ticket-canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image(); img.src = 'ticket-' + data.round + '.png?v=' + new Date().getTime();
            img.onload = () => {
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                ctx.fillStyle = "white"; ctx.font = "bold 42px Anuphan";
                ctx.fillText(data.name, 1050, 510); ctx.fillText(data.ticketID, 1530, 510);
                ctx.font = "50px Anuphan"; ctx.fillText(data.phone, 1050, 690);
            };
        }

        function setCheckRound(r) { checkRoundID = r; document.querySelectorAll('.cr-btn').forEach((b, i) => { b.style.borderColor = (i+1 === r) ? 'var(--gold)' : 'rgba(255,255,255,0.1)'; }); }

        async function checkTicketNew() {
            const phone = document.getElementById('check_phone').value;
            const snap = await db.ref(`bookings/${phone}-R${checkRoundID}`).once('value');
            if(snap.exists()) { showMultiTickets(snap.val().group); closeModal('check-ticket-modal'); } else { alert("ไม่พบข้อมูล"); }
        }

        function downloadTicket() { const link = document.createElement('a'); link.download = 'WN10-Ticket.png'; link.href = document.getElementById('ticket-canvas').toDataURL(); link.click(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); if(id=='booking-modal') generateGuestFields(1); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        window.onload = init;
    </script>
</body>
</html>
